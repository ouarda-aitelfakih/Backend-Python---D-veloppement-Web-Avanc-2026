<body>
    <h1>Login</h1>
    <form action="login" method="post">
        {% csrf_token %}
        <p>Username</p>
        <input type="text" name="username" id="username"> <br>
        <p>Password</p>
        <input type="password" name="password" id="password"> <br>
        <input type="submit" value="LOGIN">
    </form>
</body>
